<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Andy Huynh | Software Engineering Intern</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <meta
    name="description"
    content="Andy Huynh — Applied Mathematics student at San José State University focused on algorithms, systems, and backend engineering."
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card: #fafafa;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --fg: #f5f5f5;
      --muted: #9ca3af;
      --border: #262626;
      --card: #171717;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .muted {
      color: var(--muted);
    }

    .section {
      padding: 5rem 0;
      border-top: 1px solid var(--border);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition:
        transform 160ms ease,
        border-color 160ms ease,
        box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0.8rem 1rem;
      font-weight: 600;
      border: 1px solid var(--border);
      text-decoration: none;
      transition: opacity 150ms ease;
    }

    .button:hover {
      opacity: 0.72;
    }

    .button-primary {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    .button-secondary {
      color: var(--fg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>

<body data-theme="light">

  <header class="max-w-5xl mx-auto px-6 py-6">
    <nav class="flex items-center justify-between">
      <a href="#" class="font-extrabold text-lg tracking-tight">
        Andy Huynh
      </a>

      <div class="flex items-center gap-6 text-sm muted">
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
        <a href="#education">Education</a>
        <a href="#contact">Contact</a>

        <button
          id="themeButton"
          class="hover:opacity-70"
        >
          Dark
        </button>
      </div>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6">

    <section class="pt-24 pb-28">

      <div class="max-w-3xl">

        <p class="text-sm font-semibold uppercase tracking-[0.18em] muted">
          Software Engineering Intern Candidate
        </p>

        <h1 class="mt-5 text-5xl md:text-7xl font-extrabold tracking-tight leading-[0.95]">
          Andy Huynh
        </h1>

        <p class="mt-8 text-xl md:text-2xl leading-relaxed max-w-2xl">
          Applied mathematics student at San José State University focused on
          algorithms, systems, and backend engineering.
        </p>

        <div class="mt-10 flex flex-wrap gap-4">

          <a
            class="button button-primary"
            href="resume.pdf"
            target="_blank"
          >
            Resume
          </a>

          <a
            class="button button-secondary"
            href="https://github.com/andymhuynh"
            target="_blank"
          >
            GitHub
          </a>

          <a
            class="button button-secondary"
            href="mailto:ahuyn5@gmail.com"
          >
            Email
          </a>

        </div>
      </div>

    </section>

  </main>

  <script>
    const themeButton = document.getElementById("themeButton");

    function setTheme(theme) {
      document.body.setAttribute("data-theme", theme);
      themeButton.textContent = theme === "dark"
        ? "Light"
        : "Dark";

      localStorage.setItem("theme", theme);
    }

    themeButton.addEventListener("click", () => {
      const currentTheme =
        document.body.getAttribute("data-theme");

      setTheme(
        currentTheme === "dark"
          ? "light"
          : "dark"
      );
    });

    const savedTheme = localStorage.getItem("theme");

    setTheme(
      savedTheme === "dark"
        ? "dark"
        : "light"
    );
  </script>

</body>
</html>
